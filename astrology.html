<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="astrology.css">
</head>
<body>
    <div class="container">
        <h1>Astrology Insights</h1>
        <form id="astroform">
            <label for="name">First Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="surname">Surname:</label>
            <input type="text" id="surname" name="surname" required>
            <br><br>
            <label for="month">Date of Birth Month:</label>
            <input type="number" id="day" name="day" min="1" max="31" required>
            <br><br>
            <label for="month">Month:</label>
            <input type="month" id="month" name="month" min="1" max="12" required>
            <br><br>
            <label for="year">Year:</label>
            <input type="year" id="year" name="year" min="1900" max="2100" required>
            <br><br>
            <input type="submit" value="get insights">
        </form>

        <div class="result" id="result"></div>
    </div>
</body>
<script src="astrology.js"></script>
</html>
